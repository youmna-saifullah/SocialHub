name: socialhub_app
description: "SocialHub - A social media application built with clean architecture"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.1.0
  flutter_animate: ^4.5.0
  
  # State Management
  # Task 6.3: Provider package for state management
  provider: ^6.1.2
  
  # Dependency Injection
  get_it: ^7.6.7
  injectable: ^2.3.5
  
  # Networking
  # Task 6.1 Step 1: Add http package (using Dio as advanced alternative to http package)
  # Task 6.2 Step 3: Using Dio for http.post(), put(), delete() with headers and body
  dio: ^5.4.0
  connectivity_plus: ^6.0.3
  
  # Firebase
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  google_sign_in: ^7.2.0
  
  # Local Storage
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Image Handling
  # Task 6.4 Step 1: Add image_picker package for selecting images
  image_picker: ^1.0.7
  
  # Routing
  go_router: ^14.3.0
  
  # Utils
  equatable: ^2.0.5
  dartz: ^0.10.1
  intl: ^0.19.0
  logger: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  injectable_generator: ^2.4.2
  build_runner: ^2.4.8
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
